name: Build iOS App

on:
  push:
    branches: [ main, master ]
    paths:
      - 'ipa/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'ipa/**'
  workflow_dispatch:

env:
  DEVELOPER_DIR: /Applications/Xcode_15.0.app/Contents/Developer

jobs:
  build:
    runs-on: macos-13

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Select Xcode version
      run: |
        sudo xcode-select -s /Applications/Xcode_15.0.app/Contents/Developer
        xcodebuild -version

    - name: Show Xcode info
      run: |
        xcodebuild -showsdks
        sw_vers

    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.0'
        bundler-cache: true
        working-directory: ipa

    - name: Install dependencies
      working-directory: ipa
      run: |
        if [ -f Gemfile ]; then
          bundle install
        fi

    - name: Install CocoaPods
      run: |
        sudo gem install cocoapods
        pod --version

    - name: Build and Test
      working-directory: ipa
      run: |
        # Build for iOS Simulator
        xcodebuild clean build \
          -project ORBIT.xcodeproj \
          -scheme ORBIT \
          -configuration Debug \
          -sdk iphonesimulator \
          -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          | xcpretty && exit ${PIPESTATUS[0]}

    - name: Archive App (Unsigned)
      working-directory: ipa
      if: github.event_name == 'workflow_dispatch'
      run: |
        # Archive the app without code signing
        xcodebuild archive \
          -project ORBIT.xcodeproj \
          -scheme ORBIT \
          -configuration Release \
          -archivePath build/ORBIT.xcarchive \
          -sdk iphoneos \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          DEVELOPMENT_TEAM="" \
          | xcpretty && exit ${PIPESTATUS[0]}

    - name: Export IPA (Unsigned)
      working-directory: ipa
      if: github.event_name == 'workflow_dispatch'
      run: |
        # Export IPA without code signing
        xcodebuild -exportArchive \
          -archivePath build/ORBIT.xcarchive \
          -exportPath build/IPA \
          -exportOptionsPlist exportOptions.plist \
          | xcpretty && exit ${PIPESTATUS[0]}

    - name: Upload Archive
      uses: actions/upload-artifact@v3
      with:
        name: ORBIT-Archive
        path: ipa/build/ORBIT.xcarchive
        if-no-files-found: warn

    - name: Upload IPA
      uses: actions/upload-artifact@v3
      if: github.event_name == 'workflow_dispatch'
      with:
        name: ORBIT-IPA
        path: ipa/build/IPA/*.ipa
        if-no-files-found: warn

    - name: Generate Release Notes
      if: github.event_name == 'workflow_dispatch'
      run: |
        cat > RELEASE_NOTES.md << 'EOF'
        # ORBIT iOS App (Unsigned)

        卫星过境预测和实时跟踪应用

        ## 功能特性
        - 🛰️ 卫星过境预测
        - 📍 实时卫星跟踪
        - 🌍 多语言支持（中英文）
        - 🧭 罗盘辅助对星
        - ⭐ 收藏常用卫星
        - 📅 日历提醒

        ## 支持的 iOS 版本
        iOS 15.0 及以上

        ## 注意事项
        ⚠️ 此版本为未签名构建，仅用于测试和开发目的。
        要在真机上安装，需要：
        1. 使用 Xcode 重新签名并安装
        2. 或使用第三方工具（如 AltStore、SideStore）进行签名

        ## 构建信息
        - 构建时间: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
        - 提交: ${{ github.sha }}
        - 分支: ${{ github.ref_name }}
        - 签名状态: 未签名 (Unsigned)
        EOF

        cat RELEASE_NOTES.md

    - name: Upload Release Notes
      uses: actions/upload-artifact@v3
      if: github.event_name == 'workflow_dispatch'
      with:
        name: Release-Notes
        path: RELEASE_NOTES.md

    - name: Build Summary
      run: |
        echo "## 📱 Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Xcode Version:** $(xcodebuild -version)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Platform:** iOS 15.0+" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Build Status:** ✅ Success" >> $GITHUB_STEP_SUMMARY
        echo "**Code Signing:** ❌ None (Unsigned)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📦 Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "- ORBIT-Archive (.xcarchive)" >> $GITHUB_STEP_SUMMARY
        echo "- ORBIT-IPA (.ipa) [Unsigned, Manual Trigger Only]" >> $GITHUB_STEP_SUMMARY