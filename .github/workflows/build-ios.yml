name: Build iOS App

on:
  push:
    branches: [ main, master ]
    paths:
      - 'ipa/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'ipa/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Select Xcode version
      run: |
        # List available Xcode versions
        ls -la /Applications/ | grep Xcode
        # Select the latest Xcode version
        sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
        xcodebuild -version

    - name: Show Xcode info
      run: |
        xcodebuild -showsdks
        sw_vers
        xcrun simctl list devices available | grep iPhone

    - name: Install xcpretty
      run: |
        sudo gem install xcpretty

    - name: Build and Test
      working-directory: ipa
      run: |
        # Build for iOS Simulator
        xcodebuild clean build \
          -project ORBIT.xcodeproj \
          -scheme ORBIT \
          -configuration Debug \
          -sdk iphonesimulator \
          -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=18.5' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          | xcpretty && exit ${PIPESTATUS[0]}

    - name: Archive App (Unsigned)
      working-directory: ipa
      run: |
        # Archive the app without code signing
        xcodebuild archive \
          -project ORBIT.xcodeproj \
          -scheme ORBIT \
          -configuration Release \
          -archivePath build/ORBIT.xcarchive \
          -sdk iphoneos \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          DEVELOPMENT_TEAM="" \
          | xcpretty && exit ${PIPESTATUS[0]}

    - name: Export IPA (Unsigned)
      working-directory: ipa
      run: |
        # Try exportArchive first
        set +e
        xcodebuild -exportArchive \
          -archivePath build/ORBIT.xcarchive \
          -exportPath build/IPA \
          -exportOptionsPlist exportOptions.plist \
          | xcpretty
        EXPORT_RESULT=$?
        set -e

        # If exportArchive fails, manually create IPA from archive
        if [ $EXPORT_RESULT -ne 0 ] || [ ! -f "build/IPA/ORBIT.ipa" ]; then
          echo "ExportArchive failed, creating IPA manually..."
          mkdir -p build/IPA/Payload
          cp -R build/ORBIT.xcarchive/Products/Applications/ORBIT.app build/IPA/Payload/
          cd build/IPA
          zip -r ORBIT.ipa Payload/
          cd ../..
        fi

    - name: Upload Archive
      uses: actions/upload-artifact@v4
      with:
        name: ORBIT-Archive
        path: ipa/build/ORBIT.xcarchive
        if-no-files-found: warn

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: ORBIT-IPA
        path: ipa/build/IPA/*.ipa
        if-no-files-found: warn

    - name: Build Summary
      run: |
        echo "## 📱 Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Xcode Version:** $(xcodebuild -version)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Platform:** iOS 15.0+" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Build Status:** ✅ Success" >> $GITHUB_STEP_SUMMARY
        echo "**Code Signing:** ❌ None (Unsigned)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📦 Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "- ORBIT-Archive (.xcarchive)" >> $GITHUB_STEP_SUMMARY
        echo "- ORBIT-IPA (.ipa) [Unsigned]" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### ⬇️ Download" >> $GITHUB_STEP_SUMMARY
        echo "Scroll down to **Artifacts** section to download the IPA file" >> $GITHUB_STEP_SUMMARY